    reference: "2 Corinthians 4:17"
  - text: "The steps of a good man are ordered by the LORD: and he delighteth in his way."
    reference: "Psalm 37:23"
  - text: "Seek ye first the kingdom of God, and his righteousness; and all these things shall be added unto you."
    reference: "Matthew 6:33"
  - text: "Ask, and it shall be given you; seek, and ye shall find; knock, and it shall be opened unto you."
    reference: "Matthew 7:7"
  - text: "With God all things are possible."
    reference: "Matthew 19:26"
  - text: "I will lift up mine eyes unto the hills, from whence cometh my help. My help cometh from the LORD."
    reference: "Psalm 121:1-2"
  - text: "He will not suffer thy foot to be moved: he that keepeth thee will not slumber. Behold, he that keepeth Israel shall neither slumber nor sleep."
    reference: "Psalm 121:3-4"
  - text: "Though I walk in the midst of trouble, thou wilt revive me: thou shalt stretch forth thine hand against the wrath of mine enemies, and thy right hand shall save me."
    reference: "Psalm 138:7"
  - text: "He hath made every thing beautiful in his time."
    reference: "Ecclesiastes 3:11"
  - text: "I will instruct thee and teach thee in the way which thou shalt go: I will guide thee with mine eye."
    reference: "Psalm 32:8"
  - text: "Shew me thy ways, O LORD; teach me thy paths. Lead me in thy truth, and teach me: for thou art the God of my salvation; on thee do I wait all the day."
    reference: "Psalm 25:4-5"
  - text: "And the LORD shall guide thee continually, and satisfy thy soul in drought, and make fat thy bones: and thou shalt be like a watered garden, and like a spring of water, whose waters fail not."
    reference: "Isaiah 58:11"
  - text: "Thou shalt guide me with thy counsel, and afterward receive me to glory."
    reference: "Psalm 73:24"
  - text: "For this God is our God for ever and ever: he will be our guide even unto death."
    reference: "Psalm 48:14"
  - text: "If any of you lack wisdom, let him ask of God, that giveth to all men liberally, and upbraideth not; and it shall be given him."
    reference: "James 1:5"
  - text: "Also I heard the voice of the Lord, saying, Whom shall I send, and who will go for us? Then said I, Here am I; send me."
    reference: "Isaiah 6:8"
  # ── Deliverance ────────────────────────────────────────────────────────
  - text: "The righteous cry, and the LORD heareth, and delivereth them out of all their troubles."
    reference: "Psalm 34:17"
  - text: "Then they cried unto the LORD in their trouble, and he delivered them out of their distresses."
    reference: "Psalm 107:6"
  - text: "And call upon me in the day of trouble: I will deliver thee, and thou shalt glorify me."
    reference: "Psalm 50:15"
  - text: "The LORD is my rock, and my fortress, and my deliverer; my God, my strength, in whom I will trust; my buckler, and the horn of my salvation, and my high tower."
    reference: "Psalm 18:2"
  - text: "He brought me up also out of an horrible pit, out of the miry clay, and set my feet upon a rock, and established my goings."
    reference: "Psalm 40:1-2"
  - text: "Thou art my hiding place; thou shalt preserve me from trouble; thou shalt compass me about with songs of deliverance."
    reference: "Psalm 32:7"
  - text: "The angel of the LORD encampeth round about them that fear him, and delivereth them."
    reference: "Psalm 34:7"
  - text: "Who hath delivered us from the power of darkness, and hath translated us into the kingdom of his dear Son."
    reference: "Colossians 1:13"
  - text: "Who delivered us from so great a death, and doth deliver: in whom we trust that he will yet deliver us."
    reference: "2 Corinthians 1:10"
  - text: "And even to your old age I am he; and even to hoar hairs will I carry you: I have made, and I will bear; even I will carry, and will deliver you."
    reference: "Isaiah 46:4"
  - text: "The God of my rock; in him will I trust: he is my shield, and the horn of my salvation, my high tower, and my refuge, my saviour; thou savest me from violence. I will call on the LORD, who is worthy to be praised: so shall I be saved from mine enemies."
    reference: "2 Samuel 22:3-4"

