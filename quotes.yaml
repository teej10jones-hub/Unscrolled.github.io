The Bible:
  # ── Courage & Strength ──────────────────────────────────────────────────
  - text: "Be strong and of a good courage, fear not"
    reference: "Deuteronomy 31:6"
  - text: "For the LORD thy God, he it is that doth go with thee; he will not fail thee, nor forsake thee."
    reference: "Deuteronomy 31:6"
  - text: "Have not I commanded thee? Be strong and of a good courage; be not afraid, neither be thou dismayed: for the LORD thy God is with thee whithersoever thou goest."
    reference: "Joshua 1:9"
  - text: "Be of good courage, and he shall strengthen your heart, all ye that hope in the LORD."
    reference: "Psalm 31:24"
  - text: "But they that wait upon the LORD shall renew their strength; they shall mount up with wings as eagles; they shall run, and not be weary; and they shall walk, and not faint."
    reference: "Isaiah 40:31"
  - text: "Finally, my brethren, be strong in the Lord, and in the power of his might."
    reference: "Ephesians 6:10"
  - text: "I can do all things through Christ which strengtheneth me."
    reference: "Philippians 4:13"
  - text: "God is our refuge and strength, a very present help in trouble."
    reference: "Psalm 46:1"
  - text: "It is God that girdeth me with strength, and maketh my way perfect."
    reference: "Psalm 18:32"
  - text: "The LORD is my strength and song, and he is become my salvation."
    reference: "Exodus 15:2"
  - text: "The LORD GOD is my strength, and he will make my feet like hinds' feet, and he will make me to walk upon mine high places."
    reference: "Habakkuk 3:19"
  - text: "The LORD is my strength and my shield; my heart trusted in him, and I am helped: therefore my heart greatly rejoiceth"
    reference: "Psalm 28:7"
  - text: "He giveth power to the faint; and to them that have no might he increaseth strength."
    reference: "Isaiah 40:29"
  - text: "My flesh and my heart faileth: but God is the strength of my heart, and my portion for ever."
    reference: "Psalm 73:26"
  - text: "My grace is sufficient for thee: for my strength is made perfect in weakness."
    reference: "2 Corinthians 12:9-10"
  - text: "I take pleasure in infirmities, in reproaches, in necessities, in persecutions, in distresses for Christ's sake: for when I am weak, then am I strong."
    reference: "2 Corinthians 12:9-10"
  - text: "Behold, God is my salvation; I will trust, and not be afraid: for the LORD JEHOVAH is my strength and my song; he also is become my salvation."
    reference: "Isaiah 12:2"
  # ── Peace ──────────────────────────────────────────────────────────────
  - text: "Peace I leave with you, my peace I give unto you: not as the world giveth, give I unto you. Let not your heart be troubled, neither let it be afraid."
    reference: "John 14:27"
  - text: "The peace of God, which passeth all understanding, shall keep your hearts and minds through Christ Jesus."
    reference: "Philippians 4:7"
  - text: "Thou wilt keep him in perfect peace, whose mind is stayed on thee: because he trusteth in thee."
    reference: "Isaiah 26:3"
  - text: "Be careful for nothing; but in every thing by prayer and supplication with thanksgiving let your requests be made known unto God."
    reference: "Philippians 4:6"
  - text: "Rejoice in the Lord alway: and again I say, Rejoice."
    reference: "Philippians 4:4"
  - text: "Come unto me, all ye that labour and are heavy laden, and I will give you rest."
    reference: "Matthew 11:28"
  - text: "He maketh me to lie down in green pastures: he leadeth me beside the still waters. He restoreth my soul."
    reference: "Psalm 23:2-3"
  - text: "And let the peace of God rule in your hearts, to the which also ye are called in one body; and be ye thankful."
    reference: "Colossians 3:15"
  - text: "Now the Lord of peace himself give you peace always by all means. The Lord be with you all."
    reference: "2 Thessalonians 3:16"
  - text: "Therefore being justified by faith, we have peace with God through our Lord Jesus Christ."
    reference: "Romans 5:1"
  - text: "Now the God of hope fill you with all joy and peace in believing, that ye may abound in hope, through the power of the Holy Ghost."
    reference: "Romans 15:13"
  # ── Fear Not ───────────────────────────────────────────────────────────
  - text: "The LORD is my light and my salvation; whom shall I fear? the LORD is the strength of my life; of whom shall I be afraid?"
    reference: "Psalm 27:1"
  - text: "For God hath not given us the spirit of fear; but of power, and of love, and of a sound mind."
    reference: "2 Timothy 1:7"
  - text: "Fear thou not; for I am with thee: be not dismayed; for I am thy God: I will strengthen thee; yea, I will help thee; yea, I will uphold thee with the right hand of my righteousness."
    reference: "Isaiah 41:10"
  - text: "For I the LORD thy God will hold thy right hand, saying unto thee, Fear not; I will help thee."
    reference: "Isaiah 41:13"
  - text: "I sought the LORD, and he heard me, and delivered me from all my fears."
    reference: "Psalm 34:4"
  - text: "There is no fear in love; but perfect love casteth out fear"
    reference: "1 John 4:18"
  - text: "Yea, though I walk through the valley of the shadow of death, I will fear no evil: for thou art with me"
    reference: "Psalm 23:4"
  - text: "Say to them that are of a fearful heart, Be strong, fear not"
    reference: "Isaiah 35:4"
  - text: "In God have I put my trust: I will not be afraid what man can do unto me."
    reference: "Psalm 56:11"
  - text: "What time I am afraid, I will trust in thee. In God I will praise his word, in God have I put my trust; I will not fear what flesh can do unto me."
    reference: "Psalm 56:3-4"
  - text: "So that we may boldly say, The LORD is my helper, and I will not fear what man shall do unto me."
    reference: "Hebrews 13:6"
  - text: "The LORD is on my side; I will not fear: what can man do unto me?"
    reference: "Psalm 118:6"
  # ── Trust & Faith ──────────────────────────────────────────────────────
  - text: "Trust in the LORD with all thine heart; and lean not unto thine own understanding. In all thy ways acknowledge him, and he shall direct thy paths."
    reference: "Proverbs 3:5-6"
  - text: "Commit thy way unto the LORD; trust also in him; and he shall bring it to pass."
    reference: "Psalm 37:5"
  - text: "Trust in the LORD, and do good; so shalt thou dwell in the land, and verily thou shalt be fed."
    reference: "Psalm 37:3"
  - text: "Casting all your care upon him; for he careth for you."
    reference: "1 Peter 5:7"
  - text: "Humble yourselves therefore under the mighty hand of God, that he may exalt you in due time: Casting all your care upon him; for he careth for you."
    reference: "1 Peter 5:6-7"
  - text: "Now faith is the substance of things hoped for, the evidence of things not seen."
    reference: "Hebrews 11:1"
  - text: "For we walk by faith, not by sight."
    reference: "2 Corinthians 5:7"
  - text: "Blessed is the man that trusteth in the LORD, and whose hope the LORD is."
    reference: "Jeremiah 17:7"
  - text: "They that trust in the LORD shall be as mount Zion, which cannot be removed, but abideth for ever."
    reference: "Psalm 125:1"
  - text: "The name of the LORD is a strong tower: the righteous runneth into it, and is safe."
    reference: "Proverbs 18:10"
  - text: "And they that know thy name will put their trust in thee: for thou, LORD, hast not forsaken them that seek thee."
    reference: "Psalm 9:10"
  - text: "The LORD is good, a strong hold in the day of trouble; and he knoweth them that trust in him."
    reference: "Nahum 1:7"
  - text: "I will say of the LORD, He is my refuge and my fortress: my God; in him will I trust."
    reference: "Psalm 91:2"
  - text: "He is my refuge and my fortress: my God; in him will I trust."
    reference: "Psalm 91:1-2"
  - text: "So then faith cometh by hearing, and hearing by the word of God."
    reference: "Romans 10:17"
  - text: "For by grace are ye saved through faith; and that not of yourselves: it is the gift of God: Not of works, lest any man should boast."
    reference: "Ephesians 2:8-9"
  - text: "But without faith it is impossible to please him: for he that cometh to God must believe that he is, and that he is a rewarder of them that diligently seek him."
    reference: "Hebrews 11:6"
  - text: "And all things, whatsoever ye shall ask in prayer, believing, ye shall receive."
    reference: "Matthew 21:22"
  - text: "I am crucified with Christ: nevertheless I live; yet not I, but Christ liveth in me"
    reference: "Galatians 2:20"
  # ── Hope & Joy ─────────────────────────────────────────────────────────
  - text: "Weeping may endure for a night, but joy cometh in the morning."
    reference: "Psalm 30:5"
  - text: "For his anger endureth but a moment; in his favour is life: weeping may endure for a night, but joy cometh in the morning."
    reference: "Psalm 30:5"
  - text: "This is the day which the LORD hath made; we will rejoice and be glad in it."
    reference: "Psalm 118:24"
  - text: "Delight thyself also in the LORD: and he shall give thee the desires of thine heart."
    reference: "Psalm 37:4"
  - text: "The LORD thy God in the midst of thee is mighty; he will save, he will rejoice over thee with joy; he will rest in his love, he will joy over thee with singing."
    reference: "Zephaniah 3:17"
  - text: "For I know the thoughts that I think toward you, saith the LORD, thoughts of peace, and not of evil, to give you an expected end."
    reference: "Jeremiah 29:11"
  - text: "My brethren, count it all joy when ye fall into divers temptations; Knowing this, that the trying of your faith worketh patience. But let patience have her perfect work, that ye may be perfect and entire, wanting nothing."
    reference: "James 1:2-4"
  - text: "These things I have spoken unto you, that in me ye might have peace. In the world ye shall have tribulation: but be of good cheer; I have overcome the world."
    reference: "John 16:33"
  - text: "These things have I spoken unto you, that my joy might remain in you, and that your joy might be full."
    reference: "John 15:11"
  - text: "Whom having not seen, ye love; in whom, though now ye see him not, yet believing, ye rejoice with joy unspeakable and full of glory."
    reference: "1 Peter 1:8"
  - text: "For the kingdom of God is not meat and drink; but righteousness, and peace, and joy in the Holy Ghost."
    reference: "Romans 14:17"
  - text: "Thou wilt shew me the path of life: in thy presence is fulness of joy; at thy right hand there are pleasures for evermore."
    reference: "Psalm 16:11"
  - text: "Rejoicing in hope; patient in tribulation; continuing instant in prayer."
    reference: "Romans 12:12"
  - text: "Therefore with joy shall ye draw water out of the wells of salvation."
    reference: "Isaiah 12:3"
  - text: "And now, LORD, what wait I for? my hope is in thee."
    reference: "Psalm 39:7"
  - text: "I wait for the LORD, my soul doth wait, and in his word do I hope."
    reference: "Psalm 130:5"
  - text: "The LORD is my portion, saith my soul; therefore will I hope in him. The LORD is good unto them that wait for him, to the soul that seeketh him."
    reference: "Lamentations 3:24-25"
  - text: "Which hope we have as an anchor of the soul, both sure and stedfast, and which entereth into that within the veil."
    reference: "Hebrews 6:19"
  - text: "For thou art my hope, O LORD God: thou hast been my trust from my youth."
    reference: "Psalm 71:5"
  - text: "And hope maketh not ashamed; because the love of God is shed abroad in our hearts by the Holy Ghost which is given unto us."
    reference: "Romans 5:5"
  - text: "Blessed be the God and Father of our Lord Jesus Christ, which according to his abundant mercy hath begotten us again unto a lively hope by the resurrection of Jesus Christ from the dead."
    reference: "1 Peter 1:3"
  # ── Love & Grace ───────────────────────────────────────────────────────
  - text: "For God so loved the world, that he gave his only begotten Son, that whosoever believeth in him should not perish, but have everlasting life."
    reference: "John 3:16"
  - text: "But God commendeth his love toward us, in that, while we were yet sinners, Christ died for us."
    reference: "Romans 5:8"
  - text: "We love him, because he first loved us."
    reference: "1 John 4:19"
  - text: "I have loved thee with an everlasting love: therefore with lovingkindness have I drawn thee."
    reference: "Jeremiah 31:3"
  - text: "Behold, what manner of love the Father hath bestowed upon us, that we should be called the sons of God."
    reference: "1 John 3:1"
  - text: "In this was manifested the love of God toward us, because that God sent his only begotten Son into the world, that we might live through him."
    reference: "1 John 4:9-10"
  - text: "For I am persuaded, that neither death, nor life, nor angels, nor principalities, nor powers, nor things present, nor things to come, Nor height, nor depth, nor any other creature, shall be able to separate us from the love of God, which is in Christ Jesus our Lord."
    reference: "Romans 8:38-39"
  - text: "Nay, in all these things we are more than conquerors through him that loved us."
    reference: "Romans 8:37"
  - text: "Blessed be God, even the Father of our Lord Jesus Christ, the Father of mercies, and the God of all comfort"
    reference: "2 Corinthians 1:3-4"
  - text: "Wherefore comfort yourselves together, and edify one another, even as also ye do."
    reference: "1 Thessalonians 5:11"
  - text: "But God, who is rich in mercy, for his great love wherewith he loved us even when we were dead in sins, hath quickened us together with Christ."
    reference: "Ephesians 2:4-5"
  - text: "May be able to comprehend with all saints what is the breadth, and length, and depth, and height; And to know the love of Christ, which passeth knowledge, that ye might be filled with all the fulness of God."
    reference: "Ephesians 3:18-19"
  - text: "The LORD thy God in the midst of thee is mighty; he will save, he will rejoice over thee with joy."
    reference: "Zephaniah 3:17"
  # ── Faithfulness of God ────────────────────────────────────────────────
  - text: "It is of the LORD's mercies that we are not consumed, because his compassions fail not. They are new every morning: great is thy faithfulness."
    reference: "Lamentations 3:22-23"
  - text: "Know therefore that the LORD thy God, he is God, the faithful God, which keepeth covenant and mercy with them that love him and keep his commandments to a thousand generations."
    reference: "Deuteronomy 7:9"
  - text: "God is faithful, by whom ye were called unto the fellowship of his Son Jesus Christ our Lord."
    reference: "1 Corinthians 1:9"
  - text: "Faithful is he that calleth you, who also will do it."
    reference: "1 Thessalonians 5:24"
  - text: "But the LORD is faithful, who shall stablish you, and keep you from evil."
    reference: "2 Thessalonians 3:3"
  - text: "If we confess our sins, he is faithful and just to forgive us our sins, and to cleanse us from all unrighteousness."
    reference: "1 John 1:9"
  - text: "Thy mercy, O LORD, is in the heavens; and thy faithfulness reacheth unto the clouds."
    reference: "Psalm 36:5"
  - text: "Jesus Christ the same yesterday, and to day, and for ever."
    reference: "Hebrews 13:8"
  - text: "For the word of the LORD is right; and all his works are done in truth."
    reference: "Psalm 33:4"
  - text: "For all the promises of God in him are yea, and in him Amen, unto the glory of God by us."
    reference: "2 Corinthians 1:20"
  - text: "Let us hold fast the profession of our faith without wavering"
    reference: "Hebrews 10:23"
  - text: "And being fully persuaded that, what he had promised, he was able also to perform."
    reference: "Romans 4:21"
  - text: "For ever, O LORD, thy word is settled in heaven."
    reference: "Psalm 119:89"
  - text: "Whereby are given unto us exceeding great and precious promises: that by these ye might be partakers of the divine nature."
    reference: "2 Peter 1:4"
  - text: "Blessed be the LORD, that hath given rest unto his people Israel, according to all that he promised: there hath not failed one word of all his good promise"
    reference: "1 Kings 8:56"
  # ── Providence & Guidance ──────────────────────────────────────────────
  - text: "And we know that all things work together for good to them that love God, to them who are the called according to his purpose."
    reference: "Romans 8:28"
